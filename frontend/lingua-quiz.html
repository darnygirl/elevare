<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocabulary Quiz | Elevare Lingua</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-light: #1b263b;
            --cream: #faf8f5;
            --gold: #c9a227;
            --gold-light: #d4af37;
            --teal: #2ec4b6;
            --red: #e74c3c;
            --green: #27ae60;
            --white: #ffffff;
            --text: #e0e1dd;
            --text-light: #778da9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Montserrat', sans-serif;
            line-height: 1.7;
            background: var(--cream);
            min-height: 100vh;
        }

        h1, h2 { font-family: 'Cormorant Garamond', serif; font-weight: 600; color: var(--navy); }

        nav {
            background: var(--navy);
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--cream);
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-icon svg { width: 22px; height: 22px; color: var(--navy); }

        .logo-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 700;
        }

        .logo-text span { color: var(--gold); }

        .back-link {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--gold);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
        }

        .back-link:hover { text-decoration: underline; }
        .back-link svg { width: 16px; height: 16px; }

        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 40px;
            margin-bottom: 8px;
        }

        .header h1 span { color: var(--gold); }

        .progress-bar {
            background: rgba(0,0,0,0.1);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 16px;
        }

        .progress-fill {
            background: linear-gradient(90deg, var(--teal) 0%, #20a39e 100%);
            height: 100%;
            width: 0%;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 14px;
            color: var(--text-light);
        }

        .question-card {
            background: white;
            border-radius: 24px;
            padding: 48px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 32px;
        }

        .question-number {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 16px;
        }

        .question-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--navy);
            margin-bottom: 32px;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option {
            background: var(--cream);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 20px 24px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .option:hover {
            border-color: var(--gold);
            background: rgba(201, 162, 39, 0.1);
        }

        .option.correct {
            border-color: var(--green);
            background: rgba(39, 174, 96, 0.1);
        }

        .option.incorrect {
            border-color: var(--red);
            background: rgba(231, 76, 60, 0.1);
        }

        .option.disabled {
            pointer-events: none;
            opacity: 0.6;
        }

        .option-letter {
            width: 36px;
            height: 36px;
            background: var(--navy);
            color: var(--cream);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .option.correct .option-letter {
            background: var(--green);
        }

        .option.incorrect .option-letter {
            background: var(--red);
        }

        .option-text {
            font-size: 16px;
            color: var(--navy);
        }

        .feedback {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .feedback.show {
            display: block;
        }

        .feedback.correct {
            background: rgba(39, 174, 96, 0.1);
            border: 1px solid var(--green);
        }

        .feedback.incorrect {
            background: rgba(231, 76, 60, 0.1);
            border: 1px solid var(--red);
        }

        .feedback-icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feedback.correct .feedback-icon { color: var(--green); }
        .feedback.incorrect .feedback-icon { color: var(--red); }

        .feedback p {
            font-size: 14px;
            color: var(--navy);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 32px;
            border-radius: 50px;
            font-size: 15px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .btn-primary {
            background: var(--teal);
            color: var(--white);
        }

        .btn-primary:hover {
            background: #20a39e;
            transform: translateY(-2px);
        }

        .btn svg { width: 18px; height: 18px; }

        .stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            text-align: center;
            margin-top: 32px;
        }

        .stat-item .stat-value {
            font-family: 'Cormorant Garamond', serif;
            font-size: 36px;
            font-weight: 700;
            color: var(--navy);
        }

        .stat-item .stat-label {
            font-size: 13px;
            color: var(--text-light);
        }

        .results {
            text-align: center;
            padding: 60px;
            background: white;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        .results h2 {
            font-size: 36px;
            margin-bottom: 8px;
        }

        .results .score {
            font-family: 'Cormorant Garamond', serif;
            font-size: 72px;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 16px;
        }

        .results p {
            color: var(--text-light);
            margin-bottom: 32px;
        }

        @media (max-width: 768px) {
            .question-card { padding: 32px 24px; }
            .question-text { font-size: 22px; }
            .stats { gap: 24px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="../index.html" class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                    <path d="M2 17l10 5 10-5"/>
                    <path d="M2 12l10 5 10-5"/>
                </svg>
            </div>
            <span class="logo-text">ELEVARE<span>.</span></span>
        </a>
        <a href="lingua-resources.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            Back to Resources
        </a>
    </nav>

    <div class="container">
        <div class="header">
            <h1>Vocabulary <span>Quiz</span></h1>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <p class="progress-text">Question <span id="currentNum">1</span> of <span id="totalNum">5</span></p>
        </div>

        <div class="question-card" id="questionCard">
            <div class="question-number" id="questionNumber">Question 1</div>
            <div class="question-text" id="questionText">What does "schedule" mean?</div>
            
            <div class="options" id="optionsContainer">
                <div class="option" onclick="selectOption(0)">
                    <div class="option-letter">A</div>
                    <div class="option-text">A plan for carrying out a process</div>
                </div>
                <div class="option" onclick="selectOption(1)">
                    <div class="option-letter">B</div>
                    <div class="option-text">A type of food</div>
                </div>
                <div class="option" onclick="selectOption(2)">
                    <div class="option-letter">C</div>
                    <div class="option-text">A musical instrument</div>
                </div>
                <div class="option" onclick="selectOption(3)">
                    <div class="option-letter">D</div>
                    <div class="option-text">A building</div>
                </div>
            </div>

            <div class="feedback" id="feedback">
                <div class="feedback-icon" id="feedbackIcon"></div>
                <p id="feedbackText"></p>
            </div>
        </div>

        <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display: none;">
            Next Question
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <div class="stats">
            <div class="stat-item">
                <div class="stat-value" id="scoreValue">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalValue">0</div>
                <div class="stat-label">Answered</div>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                question: "What does 'schedule' mean?",
                options: [
                    "A plan for carrying out a process",
                    "A type of transportation",
                    "A piece of clothing",
                    "A weather condition"
                ],
                correct: 0,
                explanation: "Schedule means a plan for carrying out a process or activity, especially over a period of time."
            },
            {
                question: "What does 'deadline' mean?",
                options: [
                    "The bottom of a hill",
                    "A time by which something must be completed",
                    "A type of music",
                    "A place to buy food"
                ],
                correct: 1,
                explanation: "A deadline is the latest time or date by which something should be completed."
            },
            {
                question: "What does 'proficient' mean?",
                options: [
                    "Confused or puzzled",
                    "Competent or skilled in something",
                    "Slow or lazy",
                    "Happy or excited"
                ],
                correct: 1,
                explanation: "Proficient means competent or skilled in doing something; well advanced in an art, occupation, or branch of knowledge."
            },
            {
                question: "What does 'meticulous' mean?",
                options: [
                    "Careless with details",
                    "Showing great attention to detail",
                    "Very fast",
                    "Old and outdated"
                ],
                correct: 1,
                explanation: "Meticulous means showing great attention to detail; very careful and precise."
            },
            {
                question: "What does 'negotiate' mean?",
                options: [
                    "To argue loudly",
                    "To discuss something to reach an agreement",
                    "To refuse something",
                    "To walk away from something"
                ],
                correct: 1,
                explanation: "Negotiate means to discuss something in order to reach an agreement or to try to deal with a problem."
            }
        ];

        let currentQuestion = 0;
        let score = 0;
        let answered = false;

        function loadQuestion() {
            const q = questions[currentQuestion];
            document.getElementById('questionNumber').textContent = `Question ${currentQuestion + 1}`;
            document.getElementById('questionText').textContent = q.question;
            document.getElementById('progressFill').style.width = ((currentQuestion + 1) / questions.length * 100) + '%';
            document.getElementById('currentNum').textContent = currentQuestion + 1;
            document.getElementById('totalNum').textContent = questions.length;

            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';

            const letters = ['A', 'B', 'C', 'D'];
            q.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => selectOption(index);
                optionDiv.innerHTML = `
                    <div class="option-letter">${letters[index]}</div>
                    <div class="option-text">${option}</div>
                `;
                optionsContainer.appendChild(optionDiv);
            });

            document.getElementById('feedback').classList.remove('show', 'correct', 'incorrect');
            document.getElementById('nextBtn').style.display = 'none';
            answered = false;
        }

        function selectOption(index) {
            if (answered) return;
            answered = true;

            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option');
            const feedback = document.getElementById('feedback');

            options.forEach((opt, i) => {
                opt.classList.add('disabled');
                if (i === q.correct) {
                    opt.classList.add('correct');
                } else if (i === index && index !== q.correct) {
                    opt.classList.add('incorrect');
                }
            });

            if (index === q.correct) {
                score++;
                feedback.classList.add('correct', 'show');
                document.getElementById('feedbackIcon').textContent = '✓ Correct!';
                document.getElementById('feedbackText').textContent = q.explanation;
            } else {
                feedback.classList.add('incorrect', 'show');
                document.getElementById('feedbackIcon').textContent = '✗ Incorrect';
                document.getElementById('feedbackText').textContent = q.explanation;
            }

            document.getElementById('scoreValue').textContent = score;
            document.getElementById('totalValue').textContent = currentQuestion + 1;

            if (currentQuestion < questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'flex';
            } else {
                document.getElementById('nextBtn').textContent = 'See Results';
                document.getElementById('nextBtn').style.display = 'flex';
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            const percentage = Math.round((score / questions.length) * 100);
            let message = '';
            
            if (percentage >= 80) {
                message = 'Excellent! You have a great vocabulary!';
            } else if (percentage >= 60) {
                message = 'Good job! Keep practicing!';
            } else {
                message = 'Keep learning! Practice makes perfect!';
            }

            document.getElementById('questionCard').innerHTML = `
                <div class="results">
                    <h2>Quiz Complete!</h2>
                    <div class="score">${score}/${questions.length}</div>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="restartQuiz()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
                        Try Again
                    </button>
                </div>
            `;
            document.getElementById('nextBtn').style.display = 'none';
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('questionCard').innerHTML = `
                <div class="question-number" id="questionNumber">Question 1</div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="feedback" id="feedback">
                    <div class="feedback-icon" id="feedbackIcon"></div>
                    <p id="feedbackText"></p>
                </div>
            `;
            document.getElementById('scoreValue').textContent = '0';
            document.getElementById('totalValue').textContent = '0';
            loadQuestion();
        }

        loadQuestion();
    </script>
</body>
</html>
