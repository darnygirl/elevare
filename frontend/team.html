<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Team - Elevare</title>
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-light: #1b263b;
            --gold: #c9a227;
            --gold-light: #d4af37;
            --cream: #faf8f5;
            --text: #e0e1dd;
            --success: #22c55e;
            --lingua: #3b82f6;
            --rise: #f59e0b;
            --flexnexus: #8b5cf6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--navy);
            color: var(--text);
            min-height: 100vh;
            padding: 0;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(13, 27, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201, 162, 39, 0.2);
            padding: 16px 24px;
        }

        nav .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .nav-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: var(--cream);
            font-size: 20px;
            font-weight: 600;
        }

        .nav-logo span { color: var(--gold); }

        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 14px;
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover, .nav-links a.active { color: var(--gold); }

        .nav-cta {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold) !important;
            padding: 8px 20px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }

        .nav-cta:hover { background: var(--gold); color: var(--navy) !important; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        /* Hero Section */
        .hero {
            padding: 140px 24px 80px;
            text-align: center;
            background: linear-gradient(180deg, var(--navy) 0%, var(--navy-light) 100%);
            position: relative;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at 50% 0%, rgba(201, 162, 39, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .hero h1 {
            font-size: 56px;
            color: var(--cream);
            margin-bottom: 16px;
            position: relative;
        }

        .hero h1 span { color: var(--gold); }

        .hero .tagline {
            color: var(--text);
            font-size: 20px;
            max-width: 600px;
            margin: 0 auto 32px;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 48px;
            margin-top: 40px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--gold);
        }

        .stat-label {
            font-size: 13px;
            color: var(--text);
            margin-top: 4px;
        }

        /* Section Styles */
        .section {
            padding: 80px 24px;
        }

        .section-header {
            text-align: center;
            margin-bottom: 48px;
        }

        .section-title {
            font-size: 32px;
            color: var(--cream);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .section-title svg { color: var(--gold); }

        .section-desc {
            color: var(--text);
            font-size: 16px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Org Chart Section */
        .org-section {
            padding: 80px 24px;
            background: linear-gradient(180deg, var(--navy-light) 0%, var(--navy) 100%);
        }

        .org-chart {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
            position: relative;
        }

        .level {
            display: flex;
            justify-content: center;
            gap: 32px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }

        .level-connector {
            width: 2px;
            height: 40px;
            background: linear-gradient(180deg, var(--gold), transparent);
            position: relative;
        }

        .level-connector::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 10px;
            height: 10px;
            background: var(--gold);
            border-radius: 50%;
        }

        .card {
            background: var(--navy);
            border-radius: 20px;
            padding: 28px;
            text-align: center;
            width: 220px;
            position: relative;
            border: 2px solid transparent;
            transition: all 0.3s;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 12px 40px rgba(201, 162, 39, 0.15);
        }

        .card.founder {
            border-color: var(--gold);
            background: linear-gradient(135deg, var(--navy) 0%, rgba(201, 162, 39, 0.15) 100%);
            width: 260px;
        }

        .card.lingua { border-color: var(--lingua); }
        .card.rise { border-color: var(--rise); }
        .card.flexnexus { border-color: var(--flexnexus); }
        .card.admin { border-color: var(--success); }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: bold;
            color: var(--cream);
            position: relative;
            overflow: hidden;
        }

        .avatar::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            border: 3px solid var(--gold);
            opacity: 0.3;
        }

        .founder .avatar { 
            background: linear-gradient(135deg, var(--gold), var(--gold-light)); 
            width: 100px;
            height: 100px;
            font-size: 36px;
        }

        .lingua .avatar { background: linear-gradient(135deg, var(--lingua), #60a5fa); }
        .rise .avatar { background: linear-gradient(135deg, var(--rise), #fbbf24); }
        .flexnexus .avatar { background: linear-gradient(135deg, var(--flexnexus), #a78bfa); }
        .admin .avatar { background: linear-gradient(135deg, var(--success), #4ade80); }

        .card-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 4px;
        }

        .card-role {
            font-size: 13px;
            color: var(--text);
            margin-bottom: 12px;
        }

        .card-program {
            font-size: 11px;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            font-weight: 600;
        }

        .lingua .card-program { background: rgba(59, 130, 246, 0.2); color: var(--lingua); }
        .rise .card-program { background: rgba(245, 158, 11, 0.2); color: var(--rise); }
        .flexnexus .card-program { background: rgba(139, 92, 246, 0.2); color: var(--flexnexus); }
        .admin .card-program { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .founder .card-program { background: rgba(201, 162, 39, 0.2); color: var(--gold); }

        /* Departments Row */
        .departments-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 32px;
            margin-top: 64px;
        }

        @media (max-width: 900px) {
            .departments-row { grid-template-columns: 1fr; }
            .hero h1 { font-size: 40px; }
            .hero-stats { flex-wrap: wrap; gap: 24px; }
        }

        .department {
            background: var(--navy);
            border-radius: 20px;
            padding: 32px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .department:hover {
            border-color: rgba(201, 162, 39, 0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .dept-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .dept-icon {
            width: 56px;
            height: 56px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
        }

        .lingua .dept-icon { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(59, 130, 246, 0.1)); }
        .rise .dept-icon { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(245, 158, 11, 0.1)); }
        .flexnexus .dept-icon { background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(139, 92, 246, 0.1)); }

        .dept-name {
            font-size: 22px;
            font-weight: 600;
            color: var(--cream);
        }

        .dept-sub {
            font-size: 13px;
            color: var(--text);
            margin-top: 2px;
        }

        .dept-count {
            font-size: 12px;
            color: var(--text);
            background: rgba(255,255,255,0.05);
            padding: 4px 10px;
            border-radius: 20px;
            margin-top: 8px;
            display: inline-block;
        }

        .role-list {
            list-style: none;
        }

        .role-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .role-item:last-child { border-bottom: none; }
        .role-item:hover { padding-left: 8px; }

        .role-info { display: flex; align-items: center; gap: 12px; }

        .role-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .role-name {
            font-size: 14px;
            color: var(--cream);
        }

        .role-status {
            font-size: 11px;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        .role-status.current {
            background: rgba(34, 197, 94, 0.2);
            color: var(--success);
        }

        .role-status.open {
            background: rgba(201, 162, 39, 0.2);
            color: var(--gold);
        }

        /* Team Grid */
        .team-section {
            padding: 80px 24px;
            background: var(--navy);
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 24px;
        }

        .team-card {
            background: var(--navy-light);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            gap: 20px;
            align-items: flex-start;
            border: 1px solid transparent;
            transition: all 0.3s;
        }

        .team-card:hover {
            border-color: rgba(201, 162, 39, 0.3);
            transform: translateY(-4px);
        }

        .team-card.placeholder {
            border: 2px dashed rgba(255,255,255,0.1);
            opacity: 0.7;
        }

        .team-avatar {
            width: 72px;
            height: 72px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: var(--cream);
            flex-shrink: 0;
        }

        .team-info { flex: 1; }

        .team-name {
            font-size: 18px;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 4px;
        }

        .team-role {
            font-size: 13px;
            color: var(--gold);
            margin-bottom: 12px;
        }

        .team-programs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 12px;
        }

        .program-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .program-badge.lingua { background: rgba(59, 130, 246, 0.2); color: var(--lingua); }
        .program-badge.rise { background: rgba(245, 158, 11, 0.2); color: var(--rise); }
        .program-badge.flexnexus { background: rgba(139, 92, 246, 0.2); color: var(--flexnexus); }
        .program-badge.all { background: rgba(201, 162, 39, 0.2); color: var(--gold); }

        .team-bio {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        .team-social {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .team-social a {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
        }

        .team-social a:hover {
            background: var(--gold);
            color: var(--navy);
        }

        /* Join Section */
        .join-section {
            padding: 80px 24px;
            background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy) 100%);
            text-align: center;
            position: relative;
        }

        .join-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(201, 162, 39, 0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        .join-content {
            position: relative;
            max-width: 700px;
            margin: 0 auto;
        }

        .join-section h2 {
            font-size: 36px;
            color: var(--cream);
            margin-bottom: 16px;
        }

        .join-section p {
            color: var(--text);
            font-size: 16px;
            margin-bottom: 32px;
            line-height: 1.7;
        }

        .btn {
            display: inline-block;
            background: var(--gold);
            color: var(--navy);
            padding: 16px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(201, 162, 39, 0.3);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid var(--gold);
            color: var(--gold);
        }

        .btn-outline:hover {
            background: var(--gold);
            color: var(--navy);
        }

        /* Values Section */
        .values-section {
            padding: 80px 24px;
            background: var(--navy);
        }

        .values-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
        }

        @media (max-width: 900px) {
            .values-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .value-card {
            background: var(--navy-light);
            border-radius: 16px;
            padding: 28px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s;
        }

        .value-card:hover {
            border-color: rgba(201, 162, 39, 0.3);
            transform: translateY(-4px);
        }

        .value-icon {
            font-size: 40px;
            margin-bottom: 16px;
        }

        .value-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--cream);
            margin-bottom: 8px;
        }

        .value-desc {
            font-size: 13px;
            color: var(--text);
            line-height: 1.6;
        }

        /* Footer */
        footer {
            padding: 40px 24px;
            border-top: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        footer p {
            color: var(--text);
            font-size: 14px;
        }

        footer a {
            color: var(--gold);
            text-decoration: none;
        }

        footer a:hover { text-decoration: underline; }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
        }
